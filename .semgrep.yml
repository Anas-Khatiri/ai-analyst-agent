rules:
  - id: no-shell-true
    patterns:
      - pattern: subprocess.run(..., shell=True)
    message: "Do not use subprocess.run with shell=True – prefer list arguments or native Python APIs."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
  - id: no-os-system
    patterns:
      - pattern: os.system(...)
    message: "Avoid os.system – use subprocess without shell or native APIs."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
