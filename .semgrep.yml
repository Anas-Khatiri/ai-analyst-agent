rules:
  - id: no-shell-true
    patterns:
      - pattern: subprocess.run(..., shell=True)
    message: "Do not use subprocess.run with shell=True – prefer list arguments or native Python APIs."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
  - id: no-os-system
    patterns:
      - pattern: os.system(...)
    message: "Avoid os.system – use subprocess without shell or native APIs."
    severity: ERROR
    languages: [python]
    metadata:
      category: security
  - id: use-audit-log
    patterns:
      - pattern: logging.\w+(
    message: "Direct logging calls should be replaced with shared.security.audit_log.audit_event for structured, redacted logs."
    severity: WARNING
    languages: [python]
    metadata:
      category: best-practice
