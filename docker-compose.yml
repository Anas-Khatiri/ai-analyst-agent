services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_analyst_web
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GOOGLE_GENAI_USE_ENTERPRISE=${GOOGLE_GENAI_USE_ENTERPRISE}
    env_file:
      - .env
    restart: always
