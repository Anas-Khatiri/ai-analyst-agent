name: Evaluation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: curl -LsSf https://github.com/astral-sh/uv/releases/latest/download/uv-installer.sh | sh
      - name: Install project dependencies
        run: uv sync --group dev
      - name: Run evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENAI_USE_ENTERPRISE: false
        run: |
          uv run python -m evaluation.runners.eval_runner evaluation/datasets/example.jsonl
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluation_report
          path: reports/evaluation_report.html
