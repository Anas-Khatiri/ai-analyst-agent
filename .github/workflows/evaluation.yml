name: Evaluation CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    # Defense in depth on top of evaluate_one's own per-case
    # CASE_TIMEOUT_SECONDS: caps the whole job well under GitHub's 360-minute
    # default, so an unexpected hang can't silently eat the runner for hours.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.0" # matches the version pinned in Dockerfile's builder stage
          enable-cache: true
      - name: Install project dependencies
        run: uv sync --group dev
      - name: Run evaluation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_GENAI_USE_ENTERPRISE: false
        run: |
          uv run python -m evaluation.runners.eval_runner evaluation/datasets/example.jsonl
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evaluation_report
          path: reports/evaluation_report.html
