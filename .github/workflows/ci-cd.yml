name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel a stale run when new commits land on the same branch/PR, so CI
# minutes aren't burned on code that's already been superseded.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the docker job below opts back into what it
# specifically needs.
permissions:
  contents: read

env:
  UV_VERSION: "0.9.0" # matches the version pinned in Dockerfile's builder stage
  # Without this, uv falls back to whatever Python is already on the runner
  # (3.12 on current ubuntu-latest images) instead of the 3.11 this project
  # actually targets (.python-version, Dockerfile's python:3.11-slim,
  # [tool.mypy] python_version) -- a real mismatch, not just cosmetic: numpy's
  # bundled stubs use 3.12-only syntax that mypy then rejects under 3.11.
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (ruff, mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy (strict)
        run: uv run mypy .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev

      - name: Run test suite
        # No GEMINI_API_KEY on purpose: this job stays free, fast, and
        # deterministic on every push/PR -- the live-gated tests auto-skip
        # without a real key (no .env file exists in this checkout, so
        # conftest.py's load_dotenv() is a no-op here). Running the same
        # live agent calls in both this job and evaluation.yml on every
        # push doubled draw against Gemini's free-tier 20-requests/day
        # quota and reliably exhausted it; evaluation.yml is the one
        # workflow that exercises the real agent against a real Gemini key.
        run: uv run pytest -q

  docker:
    name: Build and push Docker image
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Only publish on an actual merge to main, never for an unreviewed PR.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.DOCKERHUB_USERNAME }}/ai-analyst-agent
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
